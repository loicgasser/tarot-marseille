<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot de Marseille — Tirage des Arcanes Majeurs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#d4a843;
  --gold-light:#f0d078;
  --gold-dark:#a07820;
  --bg-deep:#0a0a12;
  --bg-card:#12121e;
  --bg-surface:#1a1a2e;
  --text:#e8e0d0;
  --text-muted:#8a8070;
  --purple:#2a1a3e;
  --crimson:#8b1a1a;
  --blue-deep:#1a2a4e;
}

html{scroll-behavior:smooth}

body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:var(--bg-deep);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}

body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,0.06) 0%,transparent 60%),
             radial-gradient(ellipse at 20% 80%,rgba(42,26,62,0.3) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(26,42,78,0.3) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

.container{max-width:1100px;margin:0 auto;padding:1rem;position:relative;z-index:1}

/* Stars background */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1}100%{opacity:var(--max-o,0.7)}}

/* Header */
header{text-align:center;padding:3rem 1rem 2rem;position:relative}
header h1{
  font-family:'Cinzel',serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:900;
  color:var(--gold);letter-spacing:0.08em;
  text-shadow:0 0 40px rgba(212,168,67,0.3),0 2px 4px rgba(0,0,0,0.5);
}
header .subtitle{
  font-size:clamp(1rem,2.5vw,1.3rem);color:var(--text-muted);
  font-style:italic;margin-top:0.5rem;
}
.ornament{
  display:block;margin:1rem auto;width:200px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.ornament::after{
  content:'✦';display:block;text-align:center;margin-top:-0.7rem;
  color:var(--gold);font-size:1rem;
}

/* Question section */
.question-section{
  text-align:center;padding:2rem 1rem;max-width:600px;margin:0 auto;
}
.question-section label{
  display:block;font-family:'Cinzel',serif;font-size:1.2rem;
  color:var(--gold-light);margin-bottom:1rem;
}
.question-input{
  width:100%;padding:1rem 1.5rem;font-size:1.1rem;
  font-family:'Cormorant Garamond',serif;
  background:var(--bg-surface);border:1px solid rgba(212,168,67,0.3);
  color:var(--text);border-radius:8px;outline:none;
  transition:border-color 0.3s,box-shadow 0.3s;
}
.question-input:focus{
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(212,168,67,0.15);
}
.question-input::placeholder{color:var(--text-muted);font-style:italic}

.btn{
  display:inline-block;margin-top:1.5rem;padding:1rem 2.5rem;
  font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;
  color:var(--bg-deep);background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none;border-radius:8px;cursor:pointer;
  transition:all 0.3s;letter-spacing:0.05em;
  box-shadow:0 4px 20px rgba(212,168,67,0.3);
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 30px rgba(212,168,67,0.5);
}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-secondary{
  background:transparent;color:var(--gold);
  border:1px solid var(--gold);
}
.btn-secondary:hover{background:rgba(212,168,67,0.1)}

/* Spread area */
.spread-area{padding:2rem 0;display:none}
.spread-title{
  text-align:center;font-family:'Cinzel',serif;font-size:1.4rem;
  color:var(--gold);margin-bottom:2rem;
}
.cards-row{
  display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;
  perspective:1200px;
}

/* Card */
.card-slot{text-align:center;flex:0 0 auto}
.card-position-label{
  font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold-dark);
  margin-bottom:0.5rem;letter-spacing:0.05em;
}
.card-container{
  width:160px;height:260px;perspective:800px;cursor:default;
  margin:0 auto;
}
.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;width:100%;height:100%;backface-visibility:hidden;
  border-radius:10px;overflow:hidden;
}

/* Card back */
.card-back{
  background:var(--bg-surface);
  border:2px solid var(--gold-dark);
  display:flex;align-items:center;justify-content:center;
}
.card-back-pattern{
  width:85%;height:90%;border:1px solid var(--gold-dark);border-radius:6px;
  background:repeating-conic-gradient(var(--purple) 0% 25%,var(--bg-surface) 0% 50%) 50%/20px 20px;
  display:flex;align-items:center;justify-content:center;
}
.card-back-symbol{font-size:2.5rem;color:var(--gold);text-shadow:0 0 15px rgba(212,168,67,0.5)}

/* Card front */
.card-front{
  transform:rotateY(180deg);
  background:var(--bg-card);
  border:2px solid var(--gold);
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;padding:12px 8px;
  box-shadow:0 0 25px rgba(212,168,67,0.15);
}
.card-front .card-numeral{
  font-family:'Cinzel',serif;font-size:0.9rem;font-weight:700;
  color:var(--gold-light);letter-spacing:0.1em;
}
.card-front .card-icon{font-size:3.2rem;line-height:1;margin:0.3rem 0}
.card-front .card-title{
  font-family:'Cinzel',serif;font-size:0.75rem;font-weight:600;
  color:var(--gold);text-align:center;line-height:1.2;
}
.card-front .card-accent{
  width:60%;height:2px;margin:4px 0;
  background:linear-gradient(90deg,transparent,var(--card-color,var(--gold)),transparent);
}
.card-front .card-orientation{
  font-size:0.65rem;color:var(--text-muted);font-style:italic;
}

.card-container.reversed .card-front{transform:rotateY(180deg) rotate(180deg)}
.card-container.reversed .card-front .card-orientation{transform:rotate(180deg)}

/* Shimmer */
.card-inner.flipped .card-front::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent 40%,rgba(212,168,67,0.08) 50%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%) translateY(-100%)}
  100%{transform:translateX(100%) translateY(100%)}
}

/* Shuffle animation */
@keyframes shuffleBounce{
  0%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(-20px) rotate(-5deg)}
  50%{transform:translateY(0) rotate(0deg)}
  75%{transform:translateY(-15px) rotate(5deg)}
  100%{transform:translateY(0) rotate(0deg)}
}
.shuffling .card-container{
  animation:shuffleBounce 0.5s ease-in-out;
}
.shuffling .card-container:nth-child(1) .card-inner{animation-delay:0s}
.shuffling .card-container:nth-child(2) .card-inner{animation-delay:0.1s}
.shuffling .card-container:nth-child(3) .card-inner{animation-delay:0.2s}
.shuffling .card-container:nth-child(4) .card-inner{animation-delay:0.3s}

/* Interpretation */
.interpretation-section{
  display:none;padding:2rem 0;max-width:900px;margin:0 auto;
}
.interp-card{
  background:var(--bg-surface);border:1px solid rgba(212,168,67,0.2);
  border-radius:12px;padding:1.5rem 2rem;margin-bottom:1.5rem;
  transition:border-color 0.3s;
}
.interp-card:hover{border-color:rgba(212,168,67,0.5)}
.interp-card h3{
  font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);
  margin-bottom:0.3rem;
}
.interp-card .interp-position{
  font-size:0.85rem;color:var(--text-muted);margin-bottom:0.8rem;
  font-style:italic;
}
.interp-card .interp-meaning{font-size:1.05rem;line-height:1.7}
.interp-card .interp-keywords{
  margin-top:0.6rem;font-size:0.9rem;color:var(--gold-dark);
}

.synthesis{
  background:linear-gradient(135deg,rgba(42,26,62,0.4),rgba(26,42,78,0.4));
  border:1px solid rgba(212,168,67,0.3);border-radius:12px;
  padding:2rem;margin:2rem 0;
}
.synthesis h2{
  font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);
  text-align:center;margin-bottom:1rem;
}
.synthesis p{font-size:1.1rem;line-height:1.8;text-align:justify}

.reset-area{text-align:center;padding:2rem 0}

/* Footer */
footer{
  text-align:center;padding:2rem 1rem;margin-top:2rem;
  border-top:1px solid rgba(212,168,67,0.15);
  color:var(--text-muted);font-size:0.95rem;
}

/* Fade in animation */
.fade-in{animation:fadeIn 0.8s ease forwards;opacity:0}
@keyframes fadeIn{to{opacity:1}}

/* Responsive */
@media(max-width:720px){
  .cards-row{gap:1rem}
  .card-container{width:130px;height:215px}
  .card-front .card-icon{font-size:2.5rem}
  .card-front .card-title{font-size:0.65rem}
  .interp-card{padding:1.2rem 1rem}
}
@media(max-width:480px){
  .cards-row{gap:0.7rem}
  .card-container{width:110px;height:185px}
  .card-front .card-icon{font-size:2rem}
  .card-front .card-numeral{font-size:0.75rem}
  .card-front .card-title{font-size:0.6rem}
  header h1{letter-spacing:0.03em}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <header>
    <h1>Tarot de Marseille</h1>
    <p class="subtitle">Consultation des Arcanes Majeurs</p>
    <span class="ornament"></span>
  </header>

  <section class="question-section" id="questionSection">
    <label for="questionInput">Concentrez-vous sur votre question…</label>

    <button class="btn" id="drawBtn" onclick="startReading()">Tirer les cartes</button>
  </section>

  <section class="spread-area" id="spreadArea">
    <h2 class="spread-title">Votre Tirage — Quatre Arcanes</h2>
    <div class="cards-row" id="cardsRow"></div>
  </section>

  <section class="interpretation-section" id="interpSection">
    <div id="interpCards"></div>
    <div class="synthesis" id="synthesis"></div>
    <div class="reset-area">
      <button class="btn btn-secondary" onclick="resetReading()">Nouveau tirage</button>
    </div>
  </section>
</div>

<footer>Créé avec ✨ par Loïc Gasser</footer>

// Position definitions
const POSITIONS = [
  {key:'situation',label:'La Situation',sublabel:'Le Présent',desc:'Comment la question se manifeste actuellement'},
  {key:'obstacle', label:"L'Obstacle ou l'Appui",sublabel:'Ce qui influence',desc:'Ce qui bloque ou aide à avancer'},
  {key:'conseil',  label:'Le Conseil',sublabel:"L'Action",desc:'Quelle attitude adopter'},
  {key:'resultat', label:'Le Résultat',sublabel:'Le Futur',desc:"Vers quoi tend l'évolution"}
];

let drawnCards = [];
let userQuestion = '';

// Stars
function createStars(){
  const s=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const d=document.createElement('div');d.className='star';
    d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;--dur:${2+Math.random()*3}s;--max-o:${0.3+Math.random()*0.7};animation-delay:${Math.random()*3}s`;
    s.appendChild(d);
  }
}
createStars();

// Draw 4 unique random cards
function drawCards(){
  const indices=[...Array(22).keys()];
  const picked=[];
  for(let i=0;i<4;i++){
    const idx=Math.floor(Math.random()*indices.length);
    picked.push({card:ARCANA[indices[idx]],reversed:Math.random()<0.4});
    indices.splice(idx,1);
  }
  return picked;
}

// Build card HTML
function buildCard(draw,pos,index){
  const c=draw.card;
  const slot=document.createElement('div');
  slot.className='card-slot';
  slot.innerHTML=`
    <div class="card-position-label">${pos.label}</div>
    <div class="card-container${draw.reversed?' reversed':''}" id="card${index}">
      <div class="card-inner" id="cardInner${index}">
        <div class="card-face card-back">
          <div class="card-back-pattern"><span class="card-back-symbol">✦</span></div>
        </div>
        <div class="card-face card-front" style="--card-color:${c.color}">
          <span class="card-numeral">${c.numeral||'∞'}</span>
          <div class="card-accent"></div>
          <span class="card-icon">${c.icon}</span>
          <div class="card-accent"></div>
          <span class="card-title">${c.name}</span>
          <span class="card-orientation">${draw.reversed?'Renversée':'Droite'}</span>
        </div>
      </div>
    </div>`;
  return slot;
}

// Start reading
function startReading(){
  userQuestion=document.getElementById('questionInput').value.trim();
  if(!userQuestion){document.getElementById('questionInput').focus();return;}

  const btn=document.getElementById('drawBtn');
  btn.disabled=true;
  btn.textContent='Les cartes se mêlent…';

  drawnCards=drawCards();

  const row=document.getElementById('cardsRow');
  row.innerHTML='';
  drawnCards.forEach((d,i)=>row.appendChild(buildCard(d,POSITIONS[i],i)));

  const spreadArea=document.getElementById('spreadArea');
  spreadArea.style.display='block';
  spreadArea.classList.add('fade-in');

  // Shuffle animation
  row.classList.add('shuffling');
  setTimeout(()=>row.classList.remove('shuffling'),600);

  // Sequential flip
  drawnCards.forEach((_,i)=>{
    setTimeout(()=>{
      document.getElementById('cardInner'+i).classList.add('flipped');
    },1200+i*800);
  });

  // Show interpretation after all cards flipped
  setTimeout(()=>{
    showInterpretation();
    btn.disabled=false;
    btn.textContent='Tirer les cartes';
  },1200+drawnCards.length*800+500);

  // Scroll to spread
  setTimeout(()=>spreadArea.scrollIntoView({behavior:'smooth',block:'start'}),300);
}

// Interpretation
function showInterpretation(){
  const section=document.getElementById('interpSection');
  const container=document.getElementById('interpCards');
  container.innerHTML='';

  drawnCards.forEach((draw,i)=>{
    const c=draw.card;
    const pos=POSITIONS[i];
    const posKey=pos.key;

    // Choose interpretation based on orientation
    let meaning;
    if(draw.reversed && c.reversedPositions && c.reversedPositions[posKey]){
      meaning=c.reversedPositions[posKey];
    } else if(!draw.reversed && c.uprightPositions && c.uprightPositions[posKey]){
      meaning=c.uprightPositions[posKey];
    } else {
      meaning=c.positions[posKey];
    }

    const keywords=draw.reversed?c.reversed:c.upright;

    const div=document.createElement('div');
    div.className='interp-card fade-in';
    div.style.animationDelay=`${i*0.2}s`;
    div.innerHTML=`
      <h3>${c.icon} ${c.numeral?c.numeral+' — ':''}${c.name} ${draw.reversed?'(Renversée)':'(Droite)'}</h3>
      <div class="interp-position">${pos.label} — ${pos.desc}</div>
      <div class="interp-meaning">${meaning}</div>
      <div class="interp-keywords">Mots-clés : ${keywords}</div>`;
    container.appendChild(div);
  });

  // Synthesis
  const synthDiv=document.getElementById('synthesis');
  synthDiv.innerHTML=`<h2>✦ Synthèse de votre Tirage ✦</h2>${generateSynthesis()}`;

  section.style.display='block';
  setTimeout(()=>section.scrollIntoView({behavior:'smooth',block:'start'}),200);
}

function generateSynthesis(){
  const q=userQuestion;
  const c=drawnCards;
  const names=c.map((d,i)=>`${d.card.name}${d.reversed?' renversée':''}`);

  // Count reversed
  const revCount=c.filter(d=>d.reversed).length;
  let toneIntro='';
  if(revCount===0) toneIntro="L'ensemble de votre tirage baigne dans une énergie lumineuse et favorable — les quatre arcanes se présentent droits, signalant un alignement remarquable.";
  else if(revCount===1) toneIntro="Votre tirage est globalement positif, avec une nuance à ne pas négliger — un arcane renversé appelle votre attention sur un point de vigilance.";
  else if(revCount===2) toneIntro="Votre tirage révèle un jeu d'ombres et de lumières en équilibre — deux arcanes droits et deux renversés dessinent un chemin nuancé qui demande discernement.";
  else if(revCount===3) toneIntro="Votre tirage porte beaucoup d'énergie inversée — trois arcanes renversés signalent un moment d'intériorisation et de transformation profonde.";
  else toneIntro="Quatre arcanes renversés — voilà un tirage rare et puissant. L'énergie est profondément intériorisée, les défis sont réels mais porteurs d'une transformation radicale.";

  // Card interaction narrative
  const sit=c[0].card.name;
  const obs=c[1].card.name;
  const con=c[2].card.name;
  const res=c[3].card.name;

  let narrative=`<p style="margin-bottom:1rem">${toneIntro}</p>`;
  narrative+=`<p style="margin-bottom:1rem">Face à votre question — <em>«\u00a0${q}\u00a0»</em> — les arcanes dessinent un récit éloquent. <strong>${names[0]}</strong> en situation présente pose le décor de votre interrogation. `;

  if(c[1].reversed){
    narrative+=`<strong>${names[1]}</strong>, en position d'obstacle, signale un défi intérieur ou un blocage à transmuter. `;
  } else {
    narrative+=`<strong>${names[1]}</strong>, en position d'appui, vous offre une ressource précieuse pour naviguer cette période. `;
  }

  narrative+=`Le conseil de <strong>${names[2]}</strong> éclaire la voie à suivre, `;

  if(c[3].reversed){
    narrative+=`tandis que <strong>${names[3]}</strong> en résultat invite à la prudence et à l'ajustement pour atteindre l'issue souhaitée.</p>`;
  } else {
    narrative+=`et <strong>${names[3]}</strong> en résultat laisse entrevoir une évolution prometteuse si vous suivez cette guidance.</p>`;
  }

  narrative+=`<p>Les arcanes du Tarot de Marseille ne prédisent pas un destin figé — ils éclairent les courants à l'œuvre et vous invitent à devenir acteur conscient de votre histoire. Méditez sur ce tirage et laissez sa sagesse infuser en vous.</p>`;

  return narrative;
}

function resetReading(){
  document.getElementById('spreadArea').style.display='none';
  document.getElementById('interpSection').style.display='none';
  document.getElementById('questionInput').value='';
  document.getElementById('questionInput').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Enter key support
document.getElementById('questionInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')startReading();
});
</script>
